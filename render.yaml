services:
  # Backend API service
  - type: web
    name: portfolio-api
    env: python
    plan: free # Specify free tier
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false # This will be set manually in the Render dashboard
      - key: DB_NAME
        value: portfolio

  # Static site
  - type: web
    name: portfolio-static
    env: static
    plan: free # Specify free tier
    buildCommand: echo "No build needed for static HTML"
    staticPublishPath: ./
    routes:
      - type: rewrite
        source: /*
        destination: /portfolio.html